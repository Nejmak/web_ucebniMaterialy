<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Učební materiály</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@400;700;800;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="s1">

<div id="overlay"></div>
<div id="bgWrap"></div>

<!-- Stage switcher -->
<div class="switcher">
  <button class="sw-btn" data-s="1" onclick="switchStage(1)">1. stupeň</button>
  <button class="sw-btn" data-s="2" onclick="switchStage(2)">2. stupeň</button>
</div>

<!-- Header -->
<header>
  <div class="hdr-deco" id="hdrDeco"></div>
  <h1 class="hdr-title" id="hdrTitle">Naše škola – 1. stupeň</h1>
  <p  class="hdr-sub"   id="hdrSub">Vítejte ve světě učení a zábavy! ✨</p>
  <svg class="hdr-wave" id="hdrWave" viewBox="0 0 1440 48" preserveAspectRatio="none">
    <path d="M0,48 C240,0 480,48 720,24 C960,0 1200,48 1440,24 L1440,48 Z" fill="#fef9f0"/>
  </svg>
</header>

<!-- Blackboard -->
<section class="board-section">
  <div class="board-frame">
    <div class="board-surface" id="boardSurface">
      <div id="chalkText"></div>
    </div>
  </div>
  <!-- Decorative chalk tray -->
  <div class="chalk-tray">
    <div class="chalk-p" style="background:#FFFEF0;"></div>
    <div class="chalk-p" style="background:#FFE08A;"></div>
    <div class="chalk-p" style="background:#FFB3C6;"></div>
  </div>
</section>

<!-- Šanon nav -->
<div class="nav-wrap">
  <div class="shanon-tabs" id="shanonTabs"></div>
  <div class="nav-line"></div>
</div>

<!-- Content -->
<div class="content-wrap">
  <div class="content-box" id="contentBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
