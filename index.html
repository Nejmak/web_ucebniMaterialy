<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Učební materiály</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@400;700;800;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="s1">

<div id="overlay"></div>
<div id="bgWrap"></div>

<!-- Stage switcher -->
<div class="switcher">
  <button class="sw-btn" data-s="1" onclick="switchStage(1)">1. stupeň</button>
  <button class="sw-btn" data-s="2" onclick="switchStage(2)">2. stupeň</button>
</div>

<!-- Global search -->
<div class="gs-wrap" id="gsWrap">
  <div class="gs-field">
    <svg class="gs-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/>
    </svg>
    <input class="gs-input" id="gsInput" type="search"
           placeholder="Hledat soubor…"
           autocomplete="off" spellcheck="false"
           oninput="onGlobalSearch(this.value)"
           onfocus="onGlobalSearch(this.value)"
           onblur="setTimeout(()=>document.getElementById('gsDrop').classList.remove('visible'),160)"
           onkeydown="gsKey(event)">
  </div>
  <div class="gs-drop" id="gsDrop"></div>
</div>

<!-- Header -->
<header>
  <div class="hdr-deco" id="hdrDeco"></div>
  <h1 class="hdr-title" id="hdrTitle">Naše škola – 1. stupeň</h1>
  <p  class="hdr-sub"   id="hdrSub">Vítejte ve světě učení a zábavy! ✨</p>
  <svg class="hdr-wave" id="hdrWave" viewBox="0 0 1440 48" preserveAspectRatio="none">
    <path d="M0,48 C240,0 480,48 720,24 C960,0 1200,48 1440,24 L1440,48 Z" fill="#fef9f0"/>
  </svg>
</header>

<!-- Blackboard -->
<section class="board-section">
  <div class="board-frame">
    <div class="board-surface" id="boardSurface">
      <div id="chalkText"></div>
    </div>
  </div>
  <!-- Decorative chalk tray -->
  <div class="chalk-tray">
    <div class="chalk-p" style="background:#FFFEF0;"></div>
    <div class="chalk-p" style="background:#FFE08A;"></div>
    <div class="chalk-p" style="background:#FFB3C6;"></div>
  </div>
</section>

<!-- Šanon nav -->
<div class="nav-wrap">
  <div class="shanon-tabs" id="shanonTabs"></div>
  <div class="nav-line"></div>
</div>

<!-- Content -->
<div class="content-wrap">
  <div class="content-box" id="contentBox"></div>
</div>

<!-- Binder modal (open book) -->
<div class="binder-modal" id="binderModal" onclick="if(event.target===this)closeBinder()">
  <div class="open-book" id="openBook">

    <div class="book-left" id="bookLeft">
      <div class="book-left-lines"></div>
      <span class="book-left-icon" id="bookLeftIcon"></span>
      <div class="book-left-title" id="bookLeftTitle"></div>
      <div class="book-left-desc"  id="bookLeftDesc"></div>
      <div class="book-left-count" id="bookLeftCount"></div>
    </div>

    <div class="book-spine-center"></div>

    <div class="book-right" id="bookRight">
      <div class="book-right-header">
        <input type="text" class="book-search" id="bookSearch"
               placeholder="Hledat materiál…" oninput="onSearchInput(this.value)">
        <div class="book-filters" id="bookFilters"></div>
      </div>
      <div class="book-file-list"  id="bookFileList"></div>
      <div class="book-pagination" id="bookPagination"></div>
    </div>

    <button class="book-close-btn" onclick="closeBinder()">✕</button>
  </div>
</div>

<!-- PDF Editor Modal -->
<div id="pdfEditorModal">
  <div class="pdf-editor-wrap">

    <!-- Toolbar -->
    <div class="pdf-editor-toolbar">
      <span class="pdf-editor-title" id="pdfEditorTitle">PDF Editor</span>

      <div class="pdf-tool-group">
        <button class="pdf-tool-btn" data-tool="select" title="Vybrat / Přesunout (S)"
                onclick="PdfEditor.setTool('select')">&#9654;</button>
        <button class="pdf-tool-btn" data-tool="cut"    title="Vyjmout oblast (C)"
                onclick="PdfEditor.setTool('cut')">&#9988;</button>
        <button class="pdf-tool-btn" data-tool="text"   title="Přidat text (T)"
                onclick="PdfEditor.setTool('text')"><b>T</b></button>
        <button class="pdf-tool-btn" data-tool="erase"  title="Vymazat oblast (E)"
                onclick="PdfEditor.setTool('erase')">&#9633;</button>
      </div>

      <!-- Font bar (visible only in text mode) -->
      <div id="pdfFontBar" class="pdf-font-bar" style="display:none">
        <select id="pdfFontFamily" title="Font" onchange=""></select>
        <input  id="pdfFontSize"   type="number" value="14" min="6" max="96"
                title="Velikost" style="width:52px">
        <input  id="pdfFontColor"  type="color"  value="#000000" title="Barva textu">
        <button id="pdfBoldBtn"   class="pdf-tool-btn" title="Tučně"
                onclick="PdfEditor.toggleBold()"><b>B</b></button>
        <button id="pdfItalicBtn" class="pdf-tool-btn" title="Kurzíva"
                onclick="PdfEditor.toggleItalic()"><i>I</i></button>
      </div>

      <div class="pdf-actions">
        <button class="pdf-tool-btn" title="Načíst jiný soubor"
                onclick="PdfEditor.loadFromFile()">&#128194;</button>
        <button id="pdfSaveBtn" class="pdf-save-btn"
                onclick="PdfEditor.download()">&#128190; Uložit PDF</button>
        <button class="pdf-close-btn" onclick="PdfEditor.close()">&#10005;</button>
      </div>
    </div>

    <!-- Loading overlay (outside of scrollable pages so innerHTML= doesn't remove it) -->
    <div class="pdf-loading" id="pdfLoading" style="display:none">
      <div class="pdf-spinner"></div>
      <span>Načítám PDF…</span>
    </div>

    <!-- Pages -->
    <div class="pdf-editor-pages" id="pdfEditorPages"></div>

  </div>
</div>

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<!-- pdf-lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script src="script.js"></script>
<script src="pdf-editor.js"></script>
</body>
</html>
